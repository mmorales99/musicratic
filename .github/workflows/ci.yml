name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: "8.0.x"
  NODE_VERSION: "20"
  FLUTTER_VERSION: "3.24.0"

jobs:
  # ── Backend (.NET) ──────────────────────────────────────────
  backend:
    name: Backend Build & Test
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore src/Musicratic.sln

      - name: Build (warnings as errors)
        run: dotnet build src/Musicratic.sln --no-restore /warnaserror

      - name: Run tests with coverage
        run: >
          dotnet test src/Musicratic.sln
          --no-build
          --collect:"XPlat Code Coverage"
          --results-directory ./coverage
          --logger "trx;LogFileName=test-results.trx"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: coverage/**/coverage.cobertura.xml
          retention-days: 7

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: coverage/**/*.trx
          retention-days: 7

  # ── Web (Angular) ───────────────────────────────────────────
  web:
    name: Web Build & Test
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Lint
        working-directory: web
        run: npx ng lint

      - name: Build (production)
        working-directory: web
        run: npx ng build --configuration production

      - name: Install Playwright browsers
        working-directory: web
        run: npx playwright install --with-deps

      - name: Run unit tests with coverage
        working-directory: web
        run: npx ng test --watch=false --code-coverage

      - name: Run Playwright tests
        working-directory: web
        run: npx playwright test

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-coverage
          path: web/coverage/lcov.info
          retention-days: 7

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: web-test-results
          path: web/test-results/
          retention-days: 7

  # ── Mobile (Flutter) ────────────────────────────────────────
  mobile:
    name: Mobile Build & Test
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Analyze
        working-directory: mobile
        run: dart analyze --fatal-infos

      - name: Run tests with coverage
        working-directory: mobile
        run: flutter test --coverage

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: mobile-coverage
          path: mobile/coverage/lcov.info
          retention-days: 7

  # ── SonarQube Analysis ──────────────────────────────────────
  sonarqube:
    name: SonarQube Quality Gate
    runs-on: ubuntu-24.04
    needs: [backend, web, mobile]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download backend coverage
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: coverage/backend

      - name: Download web coverage
        uses: actions/download-artifact@v4
        with:
          name: web-coverage
          path: coverage/web

      - name: Download mobile coverage
        uses: actions/download-artifact@v4
        with:
          name: mobile-coverage
          path: coverage/mobile

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          projectBaseDir: .
          args: >
            -Dproject.settings=infra/sonarqube/sonar-project.properties
            -Dsonar.cs.opencover.reportsPaths=coverage/backend/**/coverage.cobertura.xml
            -Dsonar.typescript.lcov.reportPaths=coverage/web/lcov.info
            -Dsonar.dart.lcov.reportPaths=coverage/mobile/lcov.info

      - name: SonarQube Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ── Merged Coverage Report ──────────────────────────────────
  coverage-report:
    name: Coverage Report
    runs-on: ubuntu-24.04
    needs: [backend, web, mobile]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install ReportGenerator
        run: dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: Download backend coverage
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: coverage/backend

      - name: Download web coverage
        uses: actions/download-artifact@v4
        with:
          name: web-coverage
          path: coverage/web

      - name: Download mobile coverage
        uses: actions/download-artifact@v4
        with:
          name: mobile-coverage
          path: coverage/mobile

      - name: Generate merged HTML report
        run: >
          reportgenerator
          "-reports:coverage/backend/**/coverage.cobertura.xml;coverage/web/lcov.info;coverage/mobile/lcov.info"
          "-targetdir:coverage/report"
          "-reporttypes:Html;Cobertura;MarkdownSummaryGithub"
          "-title:Musicratic Coverage Report"

      - name: Write coverage summary to job
        if: always()
        run: |
          if [ -f coverage/report/SummaryGithub.md ]; then
            cat coverage/report/SummaryGithub.md >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload merged coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/report/
          retention-days: 30

  # ── Conventional Commits Check ──────────────────────────────
  commit-lint:
    name: Conventional Commits
    runs-on: ubuntu-24.04
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install commitlint
        run: npm install -g @commitlint/cli @commitlint/config-conventional

      - name: Validate commits
        run: >
          npx commitlint
          --from ${{ github.event.pull_request.base.sha }}
          --to ${{ github.event.pull_request.head.sha }}
          --verbose
