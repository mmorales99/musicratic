version: "3.8"

secrets:
  db_password:
    file: ./secrets/db_password.txt
  authentik_secret_key:
    file: ./secrets/authentik_secret_key.txt
  sonarqube_password:
    file: ./secrets/sonarqube_password.txt

networks:
  musicratic-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  sonarqube-data:
  sonarqube-extensions:
  sonarqube-logs:
  caddy-data:
  caddy-config:
  azurite-data:
  eventhubs-data:
  authentik-media:
  authentik-templates:

services:
  # ── PostgreSQL ────────────────────────────────────────────
  postgres:
    image: docker.io/library/postgres:16.4-alpine
    container_name: musicratic-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: musicratic
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      POSTGRES_DB: musicratic
    secrets:
      - db_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
      - ./scripts/init-schemas.sql:/docker-entrypoint-initdb.d/init-schemas.sql:ro
    networks:
      - musicratic-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U musicratic -d musicratic"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Memcached ─────────────────────────────────────────────
  memcached:
    image: docker.io/library/memcached:1.6.29-alpine
    container_name: musicratic-memcached
    restart: unless-stopped
    ports:
      - "11211:11211"
    command: ["memcached", "-m", "128"]
    networks:
      - musicratic-net
    healthcheck:
      test: ["CMD-SHELL", "echo stats | nc -w 1 localhost 11211 | grep pid"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Azure Event Hubs Emulator ─────────────────────────────
  eventhubs-emulator:
    image: mcr.microsoft.com/azure-messaging/eventhubs-emulator:1.0.1
    container_name: musicratic-eventhubs
    restart: unless-stopped
    ports:
      - "5672:5672"
    volumes:
      - eventhubs-data:/data
    networks:
      - musicratic-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5672/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Azurite (Azure Storage Emulator) ──────────────────────
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:3.32.0
    container_name: musicratic-azurite
    restart: unless-stopped
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"
    command:
      [
        "azurite",
        "--blobHost",
        "0.0.0.0",
        "--queueHost",
        "0.0.0.0",
        "--tableHost",
        "0.0.0.0",
      ]
    volumes:
      - azurite-data:/data
    networks:
      - musicratic-net
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 10000"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (Authentik session/cache store) ─────────────────
  redis:
    image: docker.io/library/redis:7.2-alpine
    container_name: musicratic-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command:
      [
        "redis-server",
        "--maxmemory",
        "128mb",
        "--maxmemory-policy",
        "allkeys-lru",
      ]
    volumes:
      - redis-data:/data
    networks:
      - musicratic-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Authentik Server ──────────────────────────────────────
  authentik-server:
    image: ghcr.io/goauthentik/server:2024.8.3
    container_name: musicratic-authentik
    restart: unless-stopped
    command: server
    ports:
      - "9000:9000"
      - "9443:9443"
    environment:
      AUTHENTIK_POSTGRESQL__HOST: postgres
      AUTHENTIK_POSTGRESQL__USER: musicratic
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: file:///run/secrets/db_password
      AUTHENTIK_SECRET_KEY: file:///run/secrets/authentik_secret_key
      AUTHENTIK_REDIS__HOST: redis
      AUTHENTIK_ERROR_REPORTING__ENABLED: "false"
    secrets:
      - db_password
      - authentik_secret_key
    volumes:
      - authentik-media:/media
      - authentik-templates:/templates
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - musicratic-net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q --spider http://localhost:9000/-/health/live/ || exit 1",
        ]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Authentik Worker ──────────────────────────────────────
  authentik-worker:
    image: ghcr.io/goauthentik/server:2024.8.3
    container_name: musicratic-authentik-worker
    restart: unless-stopped
    command: worker
    environment:
      AUTHENTIK_POSTGRESQL__HOST: postgres
      AUTHENTIK_POSTGRESQL__USER: musicratic
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: file:///run/secrets/db_password
      AUTHENTIK_SECRET_KEY: file:///run/secrets/authentik_secret_key
      AUTHENTIK_REDIS__HOST: redis
      AUTHENTIK_ERROR_REPORTING__ENABLED: "false"
    secrets:
      - db_password
      - authentik_secret_key
    volumes:
      - authentik-media:/media
      - authentik-templates:/templates
    depends_on:
      authentik-server:
        condition: service_healthy
    networks:
      - musicratic-net

  # ── SonarQube ─────────────────────────────────────────────
  sonarqube:
    image: docker.io/library/sonarqube:10.7.0-community
    container_name: musicratic-sonarqube
    restart: unless-stopped
    ports:
      - "9090:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://postgres:5432/sonarqube
      SONAR_JDBC_USERNAME: musicratic
      SONAR_JDBC_PASSWORD: /run/secrets/db_password
    secrets:
      - db_password
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - sonarqube-data:/opt/sonarqube/data
      - sonarqube-extensions:/opt/sonarqube/extensions
      - sonarqube-logs:/opt/sonarqube/logs
    networks:
      - musicratic-net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q --spider http://localhost:9000/api/system/status || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 10

  # ── Musicratic Backend (Modular Monolith) ─────────────────
  musicratic-backend:
    build:
      context: ../src
      dockerfile: Host/Musicratic.Monolith/Dockerfile
    container_name: musicratic-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      ASPNETCORE_URLS: http://+:5000
      ASPNETCORE_ENVIRONMENT: Development
      MUSICRATIC_DB_HOST: postgres
      MUSICRATIC_DB_PORT: "5432"
      MUSICRATIC_DB_NAME: musicratic
      MUSICRATIC_DB_USER: musicratic
      MUSICRATIC_CACHE_HOST: memcached
      MUSICRATIC_CACHE_PORT: "11211"
      MUSICRATIC_EVENTHUBS_HOST: eventhubs-emulator
      MUSICRATIC_AZURITE_HOST: azurite
      MUSICRATIC_AUTHENTIK_URL: http://authentik-server:9000
    secrets:
      - db_password
    depends_on:
      postgres:
        condition: service_healthy
      memcached:
        condition: service_healthy
    networks:
      - musicratic-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── BFF Web ───────────────────────────────────────────────
  musicratic-bff-web:
    build:
      context: ../src
      dockerfile: BFF/Musicratic.BFF.Web/Dockerfile
    container_name: musicratic-bff-web
    restart: unless-stopped
    ports:
      - "5010:5010"
    environment:
      ASPNETCORE_URLS: http://+:5010
      ASPNETCORE_ENVIRONMENT: Development
      MUSICRATIC_BACKEND_URL: http://musicratic-backend:5000
      MUSICRATIC_AUTHENTIK_URL: http://authentik-server:9000
    depends_on:
      musicratic-backend:
        condition: service_healthy
    networks:
      - musicratic-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5010/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── BFF Mobile ────────────────────────────────────────────
  musicratic-bff-mobile:
    build:
      context: ../src
      dockerfile: BFF/Musicratic.BFF.Mobile/Dockerfile
    container_name: musicratic-bff-mobile
    restart: unless-stopped
    ports:
      - "5020:5020"
    environment:
      ASPNETCORE_URLS: http://+:5020
      ASPNETCORE_ENVIRONMENT: Development
      MUSICRATIC_BACKEND_URL: http://musicratic-backend:5000
      MUSICRATIC_AUTHENTIK_URL: http://authentik-server:9000
    depends_on:
      musicratic-backend:
        condition: service_healthy
    networks:
      - musicratic-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5020/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Caddy (Reverse Proxy) ─────────────────────────────────
  caddy:
    image: docker.io/library/caddy:2.8-alpine
    container_name: musicratic-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      musicratic-backend:
        condition: service_healthy
      musicratic-bff-web:
        condition: service_healthy
      musicratic-bff-mobile:
        condition: service_healthy
    networks:
      - musicratic-net
    healthcheck:
      test:
        ["CMD-SHELL", "wget -q --spider http://localhost:80/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
