sonar.projectKey=musicratic
sonar.projectName=Musicratic
sonar.projectVersion=1.0

# ── Source directories ────────────────────────────────────────
sonar.sources=src,web/src,mobile/lib

# ── Test directories ─────────────────────────────────────────
sonar.tests=tests,web/e2e,mobile/test,mobile/integration_test
sonar.test.inclusions=**/*.spec.ts,**/*Tests*.cs,**/*_test.dart,**/e2e/**/*.ts

# ── Coverage report paths ────────────────────────────────────
# Backend: OpenCover XML from dotnet test (CI downloads to coverage/backend/)
sonar.cs.opencover.reportsPaths=coverage/backend/**/coverage.opencover.xml
# Web: LCOV from Angular test coverage
sonar.typescript.lcov.reportPaths=coverage/web/lcov.info
# Mobile: LCOV from flutter test --coverage
sonar.dart.lcov.reportPaths=coverage/mobile/lcov.info

# ── Source exclusions (non-production code) ──────────────────
sonar.exclusions=\
  **/bin/**,\
  **/obj/**,\
  **/node_modules/**,\
  **/.dart_tool/**,\
  **/build/**,\
  **/dist/**,\
  **/*.g.dart,\
  **/*.freezed.dart,\
  **/*.gr.dart,\
  **/*.mocks.dart,\
  **/generated_plugin_registrant.dart,\
  **/l10n/**

# ── Coverage exclusions (boot/config code) ───────────────────
sonar.coverage.exclusions=\
  **/Migrations/**,\
  **/DependencyInjection.cs,\
  **/Program.cs,\
  **/Startup.cs,\
  **/main.dart,\
  **/environments/**,\
  **/*.module.ts,\
  **/*.config.ts

# ── Duplication exclusions ───────────────────────────────────
sonar.cpd.exclusions=\
  **/*.g.dart,\
  **/*.freezed.dart,\
  **/Migrations/**
